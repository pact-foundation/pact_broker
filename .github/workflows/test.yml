name: Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"
  CLICOLOR: "1"

jobs:
  complete:
    name: Test completion check
    if: always()

    permissions:
      contents: none

    runs-on: ubuntu-latest
    needs:
      - sqlite
      - postgres
      - mysql
      - rubocop
      - pact-verify
      - bundle-audit
      - pre-commit

    steps:
      - name: Failed
        run: exit 1
        if: >-
          contains(needs.*.result, 'failure')
          || contains(needs.*.result, 'cancelled')
          || contains(needs.*.result, 'skipped')

  sqlite:
    name: SQLite - Ruby ${{ matrix.ruby_version }}
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        ruby_version: ["3.3", "3.4", "4.0"]
    env:
      OAS_COVERAGE_CHECK_ENABLED: "true"
      BUNDLE_PATH: ".bundle"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
      - run: mise use ruby@${{ matrix.ruby_version }}
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .bundle
          key: ${{ runner.os }}-gems-ruby${{ matrix.ruby_version }}-${{ hashFiles('Gemfile', 'mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-gems-ruby${{ matrix.ruby_version }}-
      - run: mise run spec

  postgres:
    name: PostgreSQL - Ruby ${{ matrix.ruby_version }} - Postgres ${{ matrix.postgres_docker_image_tag }}
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        postgres_docker_image_tag:
          - "13"
          - "18"
        ruby_version: ["3.3", "3.4", "4.0"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
      - run: mise use ruby@${{ matrix.ruby_version }}
      - run: mise run test:postgres
        env:
          POSTGRES_DOCKER_IMAGE_TAG: ${{ matrix.postgres_docker_image_tag }}

  mysql:
    name: MySQL - Ruby ${{ matrix.ruby_version }}
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        ruby_version: ["3.3", "3.4", "4.0"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
      - run: mise use ruby@${{ matrix.ruby_version }}
      - run: mise run test:mysql

  rubocop:
    runs-on: "ubuntu-latest"
    env:
      BUNDLE_PATH: ".bundle"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
      - &gem-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile', 'mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-gems-
      - run: mise run rubocop

  pact-verify:
    runs-on: "ubuntu-latest"
    env:
      BUNDLE_PATH: ".bundle"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
      - *gem-cache
      - name: Verify pacts
        run: mise run pact:verify
        env:
          GIT_SHA: ${{ github.sha }}
          PACT_BROKER_TOKEN: ${{ secrets.PACTFLOW_PACT_FOUNDATION_TOKEN }}
          PACT_BROKER_BASE_URL: https://pact-foundation.pactflow.io

  pact-v2-verify:
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        pact_url:
          - "https://raw.githubusercontent.com/pact-foundation/pact_broker-client/refs/heads/master/spec/pacts/Pact%20Broker%20Client%20V2-Pact%20Broker.json"
          - "https://raw.githubusercontent.com/pact-foundation/pact_broker-client/refs/heads/master/spec/pacts/pact_broker_client-pact_broker.json"
    env:
      BUNDLE_PATH: ".bundle"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
      - *gem-cache
      - run: mise run pact:v2:verify
        env:
          PACT_URL: ${{ matrix.pact_url }}

  bundle-audit:
    runs-on: "ubuntu-latest"
    env:
      BUNDLE_PATH: ".bundle"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
      - *gem-cache
      - run: mise run bundle:audit

  pre-commit:
    name: Pre-commit

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
      - uses: j178/prek-action@6ad80277337ad479fe43bd70701c3f7f8aa74db3  # v2.0.3
